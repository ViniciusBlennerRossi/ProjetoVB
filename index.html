<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiore Pijamas — Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- PWA -->
  <meta name="theme-color" content="#B5124A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fiore" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <script src="js/pwa.js" defer></script>
  <style>
    .login-page { min-height: 100vh; display: flex; background: #fff; }
    .login-page::before { display: none; }

    /* ── Painel esquerdo ── */
    .login-art {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: repeating-linear-gradient(90deg, #F5C7D3 0 14px, #FCEAEF 14px 28px);
    }
    .login-art-logo {
      display: block;
      width: 40%;
      max-width: 340px;
      mix-blend-mode: multiply;
    }
    .login-art-top,
    .login-art-bottom,
    .login-art-tag,
    .login-art-quote,
    .login-art-foot { display: none; }

    /* Prateada */
    .login-art.tenant-prateada {
      background: #EDE8F5;
    }

    @media (max-width: 900px) { .login-art { display: none; } }

    /* ── Painel direito (formulário) ── */
    .login-side {
      width: 460px; max-width: 100%;
      background: #fff;
      padding: 56px 48px;
      display: flex; flex-direction: column;
      justify-content: center;
    }
    .login-side-brand { margin-bottom: 40px; }
    .login-side-brand .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 500; font-style: italic;
      letter-spacing: -0.015em; line-height: 1; color: var(--text);
    }
    .login-side-brand .sub {
      font-size: 10px; letter-spacing: 0.22em;
      color: var(--text3); text-transform: uppercase;
      font-weight: 600; margin-top: 5px;
    }
    .login-side h1 {
      font-family: var(--font-serif);
      font-size: 32px; font-weight: 500;
      letter-spacing: -0.015em; color: var(--text);
      margin-bottom: 6px;
    }
    .login-side .lead { font-size: 13px; color: var(--text2); margin-bottom: 28px; }

    .input-group { position: relative; }
    .pass-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text2); padding: 4px;
      display: flex; align-items: center;
    }
    .pass-toggle:hover { color: var(--primary); }
    .form-control.has-toggle { padding-right: 38px; }

    .login-extra {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: var(--text2);
      margin: -4px 0 14px;
    }
    .login-extra label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .login-extra a { color: var(--primary); font-weight: 600; }

    .login-meta {
      margin-top: 36px; padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text3);
      text-align: center; letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<div class="login-page">

  <!-- Painel esquerdo -->
  <div class="login-art">
    <div class="login-art-top">
      <span class="login-art-tag" id="art-foot">Fiore · Pijamas</span>
    </div>
    <img src="Imagens/Fiore-logo.png" alt="Fiore" class="login-art-logo" id="art-logo" />
    <div class="login-art-bottom">
      <div class="login-art-quote" id="art-quote">"Conforto que veste como uma carícia."</div>
    </div>
  </div>

  <!-- Formulário -->
  <div class="login-side">

    <div class="login-side-brand">
      <div>
        <div class="name" id="brand-name">Fiore</div>
        <div class="sub" id="brand-sub">Pijamas · Gestão</div>
      </div>
    </div>

    <h1>Bem-vinda de volta</h1>
    <p class="lead">Acesse o painel de gestão da sua loja</p>

    <form class="login-form" onsubmit="fazerLogin(event)">
      <div id="login-error" class="alert alert-danger d-none">E-mail ou senha incorretos.</div>

      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <div class="input-group">
          <input type="password" id="senha" class="form-control has-toggle" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="pass-toggle" onclick="toggleSenha()" id="pass-icon" aria-label="Mostrar senha"></button>
        </div>
      </div>

      <div class="login-extra">
        <label><input type="checkbox" /> Manter conectada</label>
        <a href="#" onclick="event.preventDefault();mostrarToast('Procure o administrador para reset de senha','info')">Esqueci a senha</a>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-login">
        Entrar
      </button>
    </form>

    <div class="login-meta">
      Fiore Gestão v2.0 · Suporte 24/7
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/tenant.js"></script>
<script src="js/db.js"></script>
<script src="js/icons.js"></script>
<script src="js/app.js"></script>

<script>
  // Já logado? Vai direto para a home
  if (Auth.isLogado()) window.location.href = 'dashboard.html';

  // Renderiza ícones SVG
  document.getElementById('pass-icon').innerHTML = Icons.svg('eye', { size: 16 });

  // Tenant: detecta subdomínio, carrega loja, aplica tema
  let _lojaAtual = null;
  Tenant.inicializarTenant().then(loja => {
    _lojaAtual = loja;
    const artPanel = document.querySelector('.login-art');
    if (loja?.slug === 'fiore') {
      document.getElementById('art-logo').src           = 'Imagens/Fiore-logo.png';
      document.getElementById('brand-name').textContent = 'Fiore';
      document.getElementById('brand-sub').textContent  = 'Pijamas · Gestão';
      document.getElementById('art-quote').textContent  = '"Conforto que veste como uma carícia."';
      document.getElementById('art-foot').textContent   = 'Fiore · Pijamas';
    } else if (loja?.slug === 'prateada') {
      document.getElementById('art-logo').src           = 'Imagens/logo2.png';
      document.getElementById('brand-name').textContent = 'Prateada';
      document.getElementById('brand-sub').textContent  = 'Salão · Gestão';
      document.getElementById('art-quote').textContent  = '"Beleza que se traduz em confiança."';
      document.getElementById('art-foot').textContent   = 'Prateada · Salão';
      artPanel?.classList.add('tenant-prateada');
    } else if (loja?.nome) {
      document.getElementById('brand-name').textContent = loja.nome;
    }
  });

  async function fazerLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const errEl = document.getElementById('login-error');
    const btn   = document.getElementById('btn-login');

    errEl.classList.add('d-none');
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
      const user = await DB.Usuarios.autenticar(email, senha, _lojaAtual?.id_loja);
      if (user) {
        if (_lojaAtual) {
          user.loja_slug = _lojaAtual.slug;
          Tenant.salvarLoja(_lojaAtual);
        }
        Auth.login(user);
        window.location.href = 'dashboard.html';
      } else {
        errEl.textContent = 'E-mail ou senha incorretos.';
        errEl.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = 'Entrar';
        document.getElementById('senha').value = '';
        document.getElementById('senha').focus();
      }
    } catch (err) {
      errEl.textContent = 'Erro de conexão. Verifique sua internet.';
      errEl.classList.remove('d-none');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  function toggleSenha() {
    const input = document.getElementById('senha');
    const icon  = document.getElementById('pass-icon');
    input.type  = input.type === 'password' ? 'text' : 'password';
    icon.innerHTML = Icons.svg(input.type === 'password' ? 'eye' : 'eye_off', { size: 16 });
  }
</script>

</body>
</html>
