<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fornecedores — Fiore Pijamas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout" id="app">
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">🏭 Fornecedores</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="abrirModal()">+ Novo Fornecedor</button>
      </div>
    </div>
    <div class="page-content">

      <div class="card" style="padding:14px 18px; margin-bottom:20px">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="busca" class="form-control" placeholder="Buscar por nome, CNPJ ou cidade..." oninput="filtrar()" />
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">🏭 Lista de Fornecedores</div>
          <span id="count-label" class="badge badge-secondary"></span>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrapper" id="tabela-wrap"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Fornecedor -->
<div class="modal-overlay" id="modal-forn">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="modal-titulo">Novo Fornecedor</div>
      <button class="modal-close" onclick="Modal.fechar('modal-forn')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="forn-id" />
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Nome / Razão Social *</label>
          <input type="text" id="forn-nome" class="form-control" placeholder="Nome do fornecedor" />
        </div>
        <div class="form-group">
          <label class="form-label">CNPJ / CPF</label>
          <input type="text" id="forn-cnpj" class="form-control" placeholder="00.000.000/0000-00" maxlength="18" />
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Nome do Contato</label>
          <input type="text" id="forn-contato" class="form-control" placeholder="Pessoa responsável" />
        </div>
        <div class="form-group">
          <label class="form-label">Telefone / WhatsApp</label>
          <input type="text" id="forn-telefone" class="form-control" placeholder="(00) 00000-0000" />
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" id="forn-email" class="form-control" placeholder="fornecedor@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Site</label>
          <input type="text" id="forn-site" class="form-control" placeholder="www.fornecedor.com.br" />
        </div>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0" />
      <div class="form-group">
        <label class="form-label">Endereço</label>
        <input type="text" id="forn-endereco" class="form-control" placeholder="Rua, Nº, Bairro" />
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Cidade</label>
          <input type="text" id="forn-cidade" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select id="forn-estado" class="form-control form-select">
            <option value="">UF</option>
            <option>AC</option><option>AL</option><option>AM</option><option>BA</option>
            <option>CE</option><option>DF</option><option>ES</option><option>GO</option>
            <option>MA</option><option>MG</option><option>MS</option><option>MT</option>
            <option>PA</option><option>PB</option><option>PE</option><option>PI</option>
            <option>PR</option><option>RJ</option><option>RN</option><option>RO</option>
            <option>RR</option><option>RS</option><option>SC</option><option>SE</option>
            <option>SP</option><option>TO</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Observações / Condições de Pagamento</label>
        <textarea id="forn-obs" class="form-control" rows="2" placeholder="Prazo, descontos, produtos fornecidos..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.fechar('modal-forn')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvar()">💾 Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/tenant.js"></script>
  <script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
  if (!Auth.exigirPermissao('fornecedores')) throw '';
  Tenant.inicializarTenant();
  document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('fornecedores'));

  let _fornCache = [];
  let _comprasCache = [];

  async function carregar() {
    mostrarLoader();
    try {
      const [forns, compras] = await Promise.all([DB.Fornecedores.ativos(), DB.Compras.todas()]);
      _fornCache = forns;
      _comprasCache = compras;
      filtrar();
    } catch(e) {
      mostrarToast('Erro ao carregar fornecedores', 'danger');
    } finally {
      ocultarLoader();
    }
  }

  function filtrar() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const lista = _fornCache.filter(f =>
      !busca ||
      f.nome.toLowerCase().includes(busca) ||
      (f.cnpj || '').includes(busca) ||
      (f.cidade || '').toLowerCase().includes(busca)
    ).sort((a, b) => a.nome.localeCompare(b.nome));

    document.getElementById('count-label').textContent = lista.length + ' fornecedores';
    renderTabela(lista);
  }

  function renderTabela(lista) {
    if (!lista.length) {
      document.getElementById('tabela-wrap').innerHTML =
        `<div class="empty-state"><div class="empty-icon">🏭</div>
        <div class="empty-title">Nenhum fornecedor cadastrado</div>
        <div class="empty-desc"><button class="btn btn-primary btn-sm" onclick="abrirModal()">+ Cadastrar</button></div></div>`;
      return;
    }

    let html = `<table><thead><tr>
      <th>Nome</th><th>CNPJ/CPF</th><th>Contato</th><th>Telefone</th><th>Cidade</th><th>Compras</th><th>Ações</th>
    </tr></thead><tbody>`;

    lista.forEach(f => {
      const totalCompras = _comprasCache
        .filter(c => (c.fornecedor || '').toLowerCase() === f.nome.toLowerCase())
        .reduce((s, c) => s + (c.total || 0), 0);

      html += `<tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:36px;height:36px;background:linear-gradient(135deg,#01579B,#4FC3F7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;flex-shrink:0">
              ${Fmt.inicial(f.nome)}
            </div>
            <div>
              <strong>${f.nome}</strong>
              ${f.site ? `<br><small class="text-muted">${f.site}</small>` : ''}
            </div>
          </div>
        </td>
        <td><code>${f.cnpj || '-'}</code></td>
        <td>${f.contato || '-'}</td>
        <td>${Fmt.telefone(f.telefone)}</td>
        <td>${f.cidade ? f.cidade+(f.estado?'/'+f.estado:'') : '-'}</td>
        <td>${totalCompras > 0 ? Fmt.moeda(totalCompras) : '-'}</td>
        <td><div class="td-actions">
          <button class="btn btn-sm btn-ghost btn-icon" onclick="editar(${f.id})">✏️</button>
          <button class="btn btn-sm btn-ghost btn-icon" onclick="excluir(${f.id})">🗑️</button>
        </div></td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('tabela-wrap').innerHTML = html;
  }

  function abrirModal(f = null) {
    document.getElementById('forn-id').value = f ? f.id : '';
    document.getElementById('forn-nome').value = f ? f.nome : '';
    document.getElementById('forn-cnpj').value = f ? (f.cnpj || '') : '';
    document.getElementById('forn-contato').value = f ? (f.contato || '') : '';
    document.getElementById('forn-telefone').value = f ? (f.telefone || '') : '';
    document.getElementById('forn-email').value = f ? (f.email || '') : '';
    document.getElementById('forn-site').value = f ? (f.site || '') : '';
    document.getElementById('forn-endereco').value = f ? (f.endereco || '') : '';
    document.getElementById('forn-cidade').value = f ? (f.cidade || '') : '';
    document.getElementById('forn-estado').value = f ? (f.estado || '') : '';
    document.getElementById('forn-obs').value = f ? (f.observacoes || '') : '';
    document.getElementById('modal-titulo').textContent = f ? 'Editar Fornecedor' : 'Novo Fornecedor';
    Modal.abrir('modal-forn');
  }

  function editar(id) { abrirModal(_fornCache.find(f => f.id === id)); }

  function excluir(id) {
    const f = _fornCache.find(x => x.id === id);
    if (!f) return;
    confirmar(`Excluir fornecedor <strong>${f.nome}</strong>?`, async () => {
      await DB.Fornecedores.deletar(id);
      mostrarToast('Fornecedor excluído', 'danger');
      await carregar();
    });
  }

  async function salvar() {
    const id = document.getElementById('forn-id').value;
    const nome = document.getElementById('forn-nome').value.trim();
    if (!nome) return mostrarToast('Informe o nome', 'warning');

    await DB.Fornecedores.salvar({
      id: id ? Number(id) : undefined,
      nome,
      cnpj: document.getElementById('forn-cnpj').value.trim(),
      contato: document.getElementById('forn-contato').value.trim(),
      telefone: document.getElementById('forn-telefone').value.trim(),
      email: document.getElementById('forn-email').value.trim(),
      site: document.getElementById('forn-site').value.trim(),
      endereco: document.getElementById('forn-endereco').value.trim(),
      cidade: document.getElementById('forn-cidade').value.trim(),
      estado: document.getElementById('forn-estado').value,
      observacoes: document.getElementById('forn-obs').value.trim()
    });

    mostrarToast(id ? 'Fornecedor atualizado!' : 'Fornecedor cadastrado!', 'success');
    Modal.fechar('modal-forn');
    await carregar();
  }

  (async () => { await carregar(); })();
</script>
</body>
</html>
