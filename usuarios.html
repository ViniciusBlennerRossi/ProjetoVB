<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UsuÃ¡rios â€” Fiore Pijamas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout" id="app">
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">ðŸ‘¥ UsuÃ¡rios do Sistema</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="abrirModal()">+ Novo UsuÃ¡rio</button>
      </div>
    </div>
    <div class="page-content">

      <div class="card">
        <div class="card-header">
          <div class="card-title">ðŸ‘¤ Lista de UsuÃ¡rios</div>
          <span id="count-label" class="badge badge-secondary"></span>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrapper" id="tabela-wrap"></div>
        </div>
      </div>

      <!-- Aviso de seguranÃ§a -->
      <div class="alert alert-info" style="margin-top:20px">
        â„¹ï¸ <strong>Dica:</strong> As senhas sÃ£o armazenadas localmente. Em produÃ§Ã£o, utilize um sistema com criptografia de senhas e banco de dados seguro.
      </div>

    </div>
  </div>
</div>

<!-- Modal UsuÃ¡rio -->
<div class="modal-overlay" id="modal-usuario">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-titulo">Novo UsuÃ¡rio</div>
      <button class="modal-close" onclick="Modal.fechar('modal-usuario')">âœ•</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="usr-id" />

      <div class="form-group">
        <label class="form-label">Nome Completo *</label>
        <input type="text" id="usr-nome" class="form-control" placeholder="Nome do usuÃ¡rio" />
      </div>
      <div class="form-group">
        <label class="form-label">E-mail *</label>
        <input type="email" id="usr-email" class="form-control" placeholder="email@exemplo.com" />
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Senha *</label>
          <input type="password" id="usr-senha" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" autocomplete="new-password" />
          <div class="form-hint" id="usr-senha-hint">MÃ­nimo 6 caracteres</div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar Senha</label>
          <input type="password" id="usr-senha2" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Perfil de Acesso *</label>
        <select id="usr-papel" class="form-control form-select">
          <option value="vendedor">Vendedor â€” acesso limitado</option>
          <option value="admin">Administrador â€” acesso total</option>
        </select>
      </div>
      <div class="form-group">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer">
          <input type="checkbox" id="usr-ativo" checked style="width:16px; height:16px; accent-color:var(--primary)" />
          <span class="form-label" style="margin:0">UsuÃ¡rio ativo</span>
        </label>
      </div>

      <div id="edit-senha-wrap" class="d-none">
        <div class="alert alert-info">â„¹ï¸ Deixe as senhas em branco para manter a senha atual.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.fechar('modal-usuario')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarUsuario()">ðŸ’¾ Salvar UsuÃ¡rio</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/tenant.js"></script>
  <script src="js/db.js"></script>
<script src="js/icons.js"></script>
<script src="js/app.js"></script>
<script>
  if (!Auth.exigirAdmin()) throw '';
  Tenant.inicializarTenant();
  document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('usuarios'));

  let _usuariosCache = [];

  async function carregar() {
    mostrarLoader();
    try {
      _usuariosCache = await DB.Usuarios.todos();
      renderTabela();
    } catch(e) {
      mostrarToast('Erro ao carregar usuÃ¡rios', 'danger');
    } finally {
      ocultarLoader();
    }
  }

  function renderTabela() {
    document.getElementById('count-label').textContent = _usuariosCache.length + ' usuÃ¡rios';

    if (!_usuariosCache.length) {
      document.getElementById('tabela-wrap').innerHTML =
        `<div class="empty-state"><div class="empty-icon">ðŸ‘¤</div><div class="empty-title">Nenhum usuÃ¡rio</div></div>`;
      return;
    }

    const sessaoId = Auth.usuario().id;
    let html = `<table><thead><tr>
      <th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th>Criado em</th><th>AÃ§Ãµes</th>
    </tr></thead><tbody>`;

    _usuariosCache.forEach(u => {
      const isSelf = u.id === sessaoId;
      html += `<tr>
        <td>
          <div style="display:flex; align-items:center; gap:10px">
            <div class="user-avatar" style="width:32px; height:32px; font-size:13px; background:${u.papel === 'admin' ? 'var(--primary)' : 'var(--info)'}">
              ${Fmt.inicial(u.nome)}
            </div>
            <div>
              <strong>${u.nome}</strong>
              ${isSelf ? '<span class="badge badge-primary" style="margin-left:4px; font-size:10px">VocÃª</span>' : ''}
            </div>
          </div>
        </td>
        <td>${u.email}</td>
        <td>${badgeStatus(u.papel)}</td>
        <td>${u.ativo ? badgeStatus('ativo') : badgeStatus('inativo')}</td>
        <td>${Fmt.data(u.criado_em)}</td>
        <td>
          <div class="td-actions">
            <button class="btn btn-sm btn-ghost btn-icon" onclick="editarUsuario(${u.id})" title="Editar">âœï¸</button>
            ${!isSelf ? `<button class="btn btn-sm btn-ghost btn-icon" onclick="excluirUsuario(${u.id})" title="Excluir">ðŸ—‘ï¸</button>` : ''}
          </div>
        </td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('tabela-wrap').innerHTML = html;
  }

  function abrirModal(usr = null) {
    document.getElementById('usr-id').value = usr ? usr.id : '';
    document.getElementById('usr-nome').value = usr ? usr.nome : '';
    document.getElementById('usr-email').value = usr ? usr.email : '';
    document.getElementById('usr-senha').value = '';
    document.getElementById('usr-senha2').value = '';
    document.getElementById('usr-papel').value = usr ? usr.papel : 'vendedor';
    document.getElementById('usr-ativo').checked = usr ? usr.ativo : true;
    document.getElementById('modal-titulo').textContent = usr ? 'Editar UsuÃ¡rio' : 'Novo UsuÃ¡rio';
    document.getElementById('edit-senha-wrap').classList.toggle('d-none', !usr);
    Modal.abrir('modal-usuario');
  }

  function editarUsuario(id) { abrirModal(_usuariosCache.find(u => u.id === id)); }

  function excluirUsuario(id) {
    const u = _usuariosCache.find(x => x.id === id);
    if (!u) return;
    confirmar(`Excluir usuÃ¡rio <strong>${u.nome}</strong>?`, async () => {
      await DB.Usuarios.deletar(id);
      mostrarToast('UsuÃ¡rio excluÃ­do', 'danger');
      await carregar();
    });
  }

  async function salvarUsuario() {
    const id = document.getElementById('usr-id').value;
    const nome = document.getElementById('usr-nome').value.trim();
    const email = document.getElementById('usr-email').value.trim();
    const senha = document.getElementById('usr-senha').value;
    const senha2 = document.getElementById('usr-senha2').value;
    const papel = document.getElementById('usr-papel').value;
    const ativo = document.getElementById('usr-ativo').checked;

    if (!nome) return mostrarToast('Informe o nome', 'warning');
    if (!email) return mostrarToast('Informe o e-mail', 'warning');

    const existente = _usuariosCache.find(u => u.email.toLowerCase() === email.toLowerCase());
    if (existente && existente.id !== Number(id)) {
      return mostrarToast('JÃ¡ existe um usuÃ¡rio com este e-mail', 'danger');
    }

    if (!id) {
      if (!senha) return mostrarToast('Informe a senha', 'warning');
      if (senha.length < 6) return mostrarToast('Senha deve ter mÃ­nimo 6 caracteres', 'warning');
      if (senha !== senha2) return mostrarToast('As senhas nÃ£o coincidem', 'warning');
    } else if (senha) {
      if (senha.length < 6) return mostrarToast('Senha deve ter mÃ­nimo 6 caracteres', 'warning');
      if (senha !== senha2) return mostrarToast('As senhas nÃ£o coincidem', 'warning');
    }

    const dados = { nome, email, papel, ativo };
    if (id) dados.id = Number(id);
    if (senha) {
      dados.senha = senha;
    } else if (id) {
      const usr = _usuariosCache.find(u => u.id === Number(id));
      dados.senha = usr ? usr.senha : '';
    }

    await DB.Usuarios.salvar(dados);
    mostrarToast(id ? 'UsuÃ¡rio atualizado!' : 'UsuÃ¡rio criado!', 'success');
    Modal.fechar('modal-usuario');
    await carregar();
  }

  (async () => { await carregar(); })();
</script>
</body>
</html>
