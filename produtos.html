<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produtos — Fiore Pijamas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout" id="app">
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">👗 Produtos</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="abrirModal()">+ Novo Produto</button>
      </div>
    </div>
    <div class="page-content">

      <!-- Filtros -->
      <div class="search-bar card" style="padding:14px 18px; margin-bottom:20px">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="busca" class="form-control" placeholder="Buscar por nome, código..." oninput="filtrar()" />
        </div>
        <select id="filtro-categoria" class="form-control form-select" style="max-width:180px" onchange="filtrar()">
          <option value="">Todas categorias</option>
        </select>
        <select id="filtro-estoque" class="form-control form-select" style="max-width:160px" onchange="filtrar()">
          <option value="">Todos</option>
          <option value="baixo">Estoque baixo</option>
          <option value="zero">Sem estoque</option>
        </select>
      </div>

      <!-- Tabela -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">📋 Lista de Produtos <span id="count-label" class="badge badge-secondary"></span></div>
          <span id="total-estoque-valor" style="font-size:13px; color:var(--text2)"></span>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrapper" id="tabela-wrap"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Produto -->
<div class="modal-overlay" id="modal-produto">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-titulo">Novo Produto</div>
      <button class="modal-close" onclick="Modal.fechar('modal-produto')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="prod-id" />
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Código *</label>
          <input type="text" id="prod-codigo" class="form-control" placeholder="Ex: VES001" />
        </div>
        <div class="form-group">
          <label class="form-label">Categoria *</label>
          <select id="prod-categoria" class="form-control form-select"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nome do Produto *</label>
        <input type="text" id="prod-nome" class="form-control" placeholder="Ex: Vestido Floral Rosa" />
      </div>
      <div class="form-row cols-3">
        <div class="form-group" id="group-tamanho">
          <label class="form-label" id="label-tamanho">Tamanho</label>
     <select id="prod-tamanho" class="form-control form-select">
    <option value="">-</option>
    <option>PP</option><option>P</option><option>M</option>
    <option>G</option><option>GG</option><option>XGG</option><option>G1</option><option>G2</option>
    <option>34</option><option>36</option><option>38</option>
    <option>40</option><option>42</option><option>44</option><option>46</option><option>48</option>
    <option>Tamanho 2</option><option>Tamanho 3</option><option>Tamanho 4</option><option>Tamanho 5</option><option>Tamanho 6</option>
    <option>Único</option>
</select>
        </div>
        <div class="form-group" id="group-cor">
          <label class="form-label" id="label-cor">Cor</label>
          <input type="text" id="prod-cor" class="form-control" placeholder="Ex: Rosa" />
        </div>
        <div class="form-group">
          <label class="form-label">Estoque Inicial</label>
          <input type="number" id="prod-estoque" class="form-control" value="0" min="0" />
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Custo (R$) *</label>
          <input type="number" id="prod-custo" class="form-control" placeholder="0,00" step="0.01" min="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Preço de Venda (R$) *</label>
          <input type="number" id="prod-preco" class="form-control" placeholder="0,00" step="0.01" min="0" />
          <div class="form-hint" id="margem-hint"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <textarea id="prod-descricao" class="form-control" rows="2" placeholder="Detalhes adicionais..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.fechar('modal-produto')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarProduto()">💾 Salvar Produto</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/tenant.js"></script>
  <script src="js/db.js"></script>
<script src="js/icons.js"></script>
<<script src="js/app.js"></script>
<script>
  if (!Auth.exigirLogin()) throw '';
  document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('produtos'));

  let todosOsProdutos = [];
  let catMap = {};
  let _isPrateada = false;

  function adaptarTenant(loja) {
    if (loja?.slug !== 'prateada') return;
    _isPrateada = true;

    // Topbar icon
    const topTitle = document.querySelector('.topbar-title');
    if (topTitle) topTitle.textContent = '🛍️ Produtos';

    // Label + campo Tamanho → Volume/Peso (text input)
    document.getElementById('label-tamanho').textContent = 'Volume/Peso';
    const groupTamanho = document.getElementById('group-tamanho');
    const oldSelect = document.getElementById('prod-tamanho');
    const newInput = document.createElement('input');
    newInput.type = 'text';
    newInput.id = 'prod-tamanho';
    newInput.className = 'form-control';
    newInput.placeholder = 'Ex: 200ml, 50g';
    groupTamanho.replaceChild(newInput, oldSelect);

    // Label Cor → Marca
    document.getElementById('label-cor').textContent = 'Marca';
    document.getElementById('prod-cor').placeholder = 'Ex: O Boticário, Natura';
  }

  const _CATS_PRATEADA = [
    'Serviços de Cabelo (Corte, Coloração, Tratamentos)',
    'Serviços de Manicure e Pedicure',
    'Serviços de Estética e Maquiagem',
    'Kits e Itens para Presente',
    'Perfumaria', 'Maquiagem', 'Cuidados com a Pele', 'Cabelos',
    'Corpo e Banho', 'Presentes e Kits', 'Acessórios', 'Outros'
  ];

  async function garantirCategoriasPrateada(cats) {
    if (!_isPrateada) return cats;
    // Adiciona categorias que ainda não existem (por nome)
    const existentes = new Set(cats.map(c => c.nome));
    const faltando = _CATS_PRATEADA.filter(n => !existentes.has(n));
    if (!faltando.length) return cats;
    const criadas = await Promise.all(faltando.map(nome => DB.Categorias.salvar({ nome })));
    return [...cats, ...criadas.filter(Boolean)].sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
  }

  async function carregar() {
    mostrarLoader();
    try {
      let [prods, cats] = await Promise.all([DB.Produtos.ativos(), DB.Categorias.todas()]);
      cats = await garantirCategoriasPrateada(cats);
      todosOsProdutos = prods;
      catMap = Object.fromEntries(cats.map(c => [c.id, c]));
      popularCategoriasSelect(cats);
      filtrar();
    } catch(e) {
      mostrarToast('Erro ao carregar produtos', 'danger');
    } finally {
      ocultarLoader();
    }
  }

  function popularCategoriasSelect(cats) {
    const selFiltro = document.getElementById('filtro-categoria');
    const selModal = document.getElementById('prod-categoria');
    selFiltro.innerHTML = '<option value="">Todas categorias</option>';
    selModal.innerHTML = '<option value="">Selecione...</option>';
    cats.forEach(c => {
      selFiltro.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
      selModal.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
    });
  }

  function filtrar() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const catId = Number(document.getElementById('filtro-categoria').value);
    const estFiltro = document.getElementById('filtro-estoque').value;

    let lista = todosOsProdutos.filter(p => {
      const matchBusca = !busca ||
        p.nome.toLowerCase().includes(busca) ||
        (p.codigo || '').toLowerCase().includes(busca) ||
        (p.cor || '').toLowerCase().includes(busca);
      const matchCat = !catId || p.categoria_id === catId;
      const matchEst = !estFiltro ||
        (estFiltro === 'baixo' && p.estoque > 0 && p.estoque <= 5) ||
        (estFiltro === 'zero' && p.estoque <= 0);
      return matchBusca && matchCat && matchEst;
    });

    renderTabela(lista);

    const totalVal = lista.reduce((s, p) => s + (p.estoque || 0) * (p.custo || 0), 0);
    document.getElementById('count-label').textContent = lista.length + ' produtos';
    document.getElementById('total-estoque-valor').textContent = 'Valor em estoque: ' + Fmt.moeda(totalVal);
  }

  function renderTabela(lista) {
    if (!lista.length) {
      document.getElementById('tabela-wrap').innerHTML =
        `<div class="empty-state"><div class="empty-icon">👗</div>
        <div class="empty-title">Nenhum produto encontrado</div>
        <div class="empty-desc"><button class="btn btn-primary btn-sm" onclick="abrirModal()">+ Adicionar produto</button></div></div>`;
      return;
    }

    const col3Label = _isPrateada ? 'Marca' : 'Tamanho';
    let html = `<table><thead><tr>
      <th>Código</th><th>Produto</th><th>Categoria</th>
      <th>${col3Label}</th><th>Estoque</th><th>Custo</th><th>Preço</th><th>Margem</th><th>Ações</th>
    </tr></thead><tbody>`;

    lista.forEach(p => {
      const cat = catMap[p.categoria_id];
      const margem = p.custo > 0 ? ((p.preco - p.custo) / p.custo * 100) : 0;
      const estBadge = p.estoque <= 0
        ? `<span class="badge badge-danger">${p.estoque}</span>`
        : p.estoque <= 5
          ? `<span class="badge badge-warning">${p.estoque}</span>`
          : `<span class="badge badge-success">${p.estoque}</span>`;
      // Para Prateada: col3 = marca (cor), subtítulo = volume/peso (tamanho)
      const col3Val = _isPrateada ? (p.cor || '-') : (p.tamanho || '-');
      const subtitulo = _isPrateada
        ? (p.tamanho ? `<br><small class="text-muted">${p.tamanho}</small>` : '')
        : (p.cor ? `<br><small class="text-muted">${p.cor}</small>` : '');
      html += `<tr>
        <td><code>${p.codigo || '-'}</code></td>
        <td>
          <strong>${p.nome}</strong>
          ${subtitulo}
        </td>
        <td>${cat ? cat.nome : '-'}</td>
        <td>${col3Val}</td>
        <td>${estBadge}</td>
        <td>${Fmt.moeda(p.custo)}</td>
        <td><strong>${Fmt.moeda(p.preco)}</strong></td>
        <td class="${margem >= 50 ? 'text-success' : margem >= 20 ? 'text-warning' : 'text-danger'}">${margem.toFixed(0)}%</td>
        <td>
          <div class="td-actions">
            <button class="btn btn-sm btn-ghost btn-icon" onclick="editarProduto(${p.id})" title="Editar">✏️</button>
            ${Auth.isAdmin() ? `<button class="btn btn-sm btn-ghost btn-icon" onclick="excluirProduto(${p.id})" title="Excluir">🗑️</button>` : ''}
          </div>
        </td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('tabela-wrap').innerHTML = html;
  }

  function abrirModal(prod = null) {
    document.getElementById('prod-id').value = prod ? prod.id : '';
    document.getElementById('prod-codigo').value = prod ? (prod.codigo || '') : '';
    document.getElementById('prod-nome').value = prod ? prod.nome : '';
    document.getElementById('prod-categoria').value = prod ? (prod.categoria_id || '') : '';
    document.getElementById('prod-tamanho').value = prod ? (prod.tamanho || '') : '';
    document.getElementById('prod-cor').value = prod ? (prod.cor || '') : '';
    document.getElementById('prod-custo').value = prod ? prod.custo : '';
    document.getElementById('prod-preco').value = prod ? prod.preco : '';
    document.getElementById('prod-estoque').value = prod ? (prod.estoque || 0) : 0;
    document.getElementById('prod-descricao').value = prod ? (prod.descricao || '') : '';
    document.getElementById('modal-titulo').textContent = prod ? 'Editar Produto' : 'Novo Produto';
    document.getElementById('margem-hint').textContent = '';
    Modal.abrir('modal-produto');
  }

  function editarProduto(id) {
    const p = todosOsProdutos.find(x => x.id === id);
    abrirModal(p);
  }

  function excluirProduto(id) {
    const p = todosOsProdutos.find(x => x.id === id);
    confirmar(`Deseja excluir o produto <strong>${p.nome}</strong>?`, async () => {
      await DB.Produtos.deletar(id);
      mostrarToast('Produto excluído', 'success');
      await carregar();
    });
  }

  async function salvarProduto() {
    const id = document.getElementById('prod-id').value;
    const codigo = document.getElementById('prod-codigo').value.trim();
    const nome = document.getElementById('prod-nome').value.trim();
    const categoria_id = Number(document.getElementById('prod-categoria').value);
    const custo = parseFloat(document.getElementById('prod-custo').value) || 0;
    const preco = parseFloat(document.getElementById('prod-preco').value) || 0;
    const estoque = parseInt(document.getElementById('prod-estoque').value) || 0;

    if (!nome) return mostrarToast('Informe o nome do produto', 'warning');
    if (!custo || custo <= 0) return mostrarToast('Informe o custo do produto', 'warning');
    if (!preco || preco <= 0) return mostrarToast('Informe o preço de venda', 'warning');

    const dados = {
      codigo, nome, categoria_id,
      tamanho: document.getElementById('prod-tamanho').value,
      cor: document.getElementById('prod-cor').value.trim(),
      custo, preco,
      descricao: document.getElementById('prod-descricao').value.trim(),
      ativo: true
    };

    if (id) {
      dados.id = Number(id);
      await DB.Produtos.salvar(dados);
      mostrarToast('Produto atualizado!', 'success');
    } else {
      dados.estoque = estoque;
      await DB.Produtos.salvar(dados);
      mostrarToast('Produto cadastrado!', 'success');
    }

    Modal.fechar('modal-produto');
    await carregar();
  }

  document.getElementById('prod-preco').addEventListener('input', calcularMargem);
  document.getElementById('prod-custo').addEventListener('input', calcularMargem);

  function calcularMargem() {
    const custo = parseFloat(document.getElementById('prod-custo').value) || 0;
    const preco = parseFloat(document.getElementById('prod-preco').value) || 0;
    const hint = document.getElementById('margem-hint');
    if (custo > 0 && preco > 0) {
      const margem = ((preco - custo) / custo * 100);
      const lucro = preco - custo;
      hint.textContent = `Margem: ${margem.toFixed(1)}% | Lucro: ${Fmt.moeda(lucro)}`;
      hint.style.color = margem < 0 ? 'var(--danger)' : margem < 20 ? 'var(--warning)' : 'var(--success)';
    } else {
      hint.textContent = '';
    }
  }

  (async () => {
    const loja = await Tenant.inicializarTenant();
    adaptarTenant(loja);
    await carregar();
  })();
</script>
</body>
</html>
