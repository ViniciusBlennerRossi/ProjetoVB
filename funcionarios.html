п»ҝ<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuncionГғВЎrios ГўвӮ¬вҖқ Fiore Pijamas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout" id="app">
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Г°ЕёвҖҳВӨ FuncionГғВЎrios</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="abrirModal()">+ Novo FuncionГғВЎrio</button>
      </div>
    </div>
    <div class="page-content">

      <!-- Stats -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px" id="stats-area"></div>

      <div class="card" style="padding:14px 18px;margin-bottom:20px">
        <div class="search-input-wrap">
          <span class="search-icon">Г°ЕёвҖқВҚ</span>
          <input type="text" id="busca" class="form-control" placeholder="Buscar por nome ou cargo..." oninput="filtrar()" />
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Г°ЕёвҖҳВӨ Quadro de FuncionГғВЎrios</div>
          <span id="count-label" class="badge badge-secondary"></span>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrapper" id="tabela-wrap"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal FuncionГғВЎrio -->
<div class="modal-overlay" id="modal-func">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="modal-titulo">Novo FuncionГғВЎrio</div>
      <button class="modal-close" onclick="Modal.fechar('modal-func')">ГўЕ“вҖў</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="func-id" />
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Nome Completo *</label>
          <input type="text" id="func-nome" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">CPF</label>
          <input type="text" id="func-cpf" class="form-control" placeholder="000.000.000-00" maxlength="14" />
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Cargo / FunГғВ§ГғВЈo *</label>
          <input type="text" id="func-cargo" class="form-control" placeholder="Ex: Vendedora, Caixa..." />
        </div>
        <div class="form-group">
          <label class="form-label">SalГғВЎrio (R$)</label>
          <input type="number" id="func-salario" class="form-control" step="0.01" min="0" placeholder="0,00" />
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input type="text" id="func-telefone" class="form-control" placeholder="(00) 00000-0000" />
        </div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" id="func-email" class="form-control" />
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Data de AdmissГғВЈo</label>
          <input type="date" id="func-admissao" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">Tipo de Contrato</label>
          <select id="func-contrato" class="form-control form-select">
            <option value="clt">CLT</option>
            <option value="pj">PJ</option>
            <option value="autonomo">AutГғВҙnomo</option>
            <option value="estagio">EstГғВЎgio</option>
            <option value="temporario">TemporГғВЎrio</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">EndereГғВ§o</label>
        <input type="text" id="func-endereco" class="form-control" placeholder="Rua, NГӮВә, Bairro, Cidade" />
      </div>
      <div class="form-group">
        <label class="form-label">ObservaГғВ§ГғВөes</label>
        <textarea id="func-obs" class="form-control" rows="2" placeholder="ComissГғВөes, horГғВЎrios, benefГғВӯcios..."></textarea>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="func-ativo" checked style="width:16px;height:16px;accent-color:var(--primary)" />
          <span class="form-label" style="margin:0">FuncionГғВЎrio ativo</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.fechar('modal-func')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvar()">Г°ЕёвҖҷВҫ Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/tenant.js"></script>
  <script src="js/db.js"></script>
<script src="js/icons.js"></script>
<script src="js/app.js"></script>
<script>
  if (!Auth.exigirPermissao('funcionarios')) throw '';
  Tenant.inicializarTenant();
  document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('funcionarios'));

  let _funcCache = [];
  let _totalFolha = 0;

  async function carregar() {
    mostrarLoader();
    try {
      const [todos, folha] = await Promise.all([DB.Funcionarios.todos(), DB.Funcionarios.totalFolha()]);
      _funcCache = todos;
      _totalFolha = folha;
      renderStats();
      filtrar();
    } catch(e) {
      mostrarToast('Erro ao carregar funcionГғВЎrios', 'danger');
    } finally {
      ocultarLoader();
    }
  }

  function renderStats() {
    const ativos = _funcCache.filter(f => f.ativo !== false);
    const inativos = _funcCache.filter(f => f.ativo === false);
    document.getElementById('stats-area').innerHTML = `
      <div class="stat-card"><div class="stat-icon green">Г°ЕёвҖҳВӨ</div>
        <div class="stat-info"><div class="stat-value">${ativos.length}</div><div class="stat-label">FuncionГғВЎrios Ativos</div></div></div>
      <div class="stat-card"><div class="stat-icon pink">Г°ЕёвҖҷВё</div>
        <div class="stat-info"><div class="stat-value">${Fmt.moeda(_totalFolha)}</div><div class="stat-label">Folha de Pagamento</div></div></div>
      <div class="stat-card"><div class="stat-icon orange">Г°ЕёвҖңвҖ№</div>
        <div class="stat-info"><div class="stat-value">${inativos.length}</div><div class="stat-label">Inativos</div></div></div>`;
  }

  function filtrar() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const lista = _funcCache.filter(f =>
      !busca ||
      f.nome.toLowerCase().includes(busca) ||
      (f.cargo || '').toLowerCase().includes(busca)
    ).sort((a, b) => a.nome.localeCompare(b.nome));

    document.getElementById('count-label').textContent = lista.length + ' funcionГғВЎrios';
    renderTabela(lista);
  }

  const contratos = { clt:'CLT', pj:'PJ', autonomo:'AutГғВҙnomo', estagio:'EstГғВЎgio', temporario:'TemporГғВЎrio' };

  function renderTabela(lista) {
    if (!lista.length) {
      document.getElementById('tabela-wrap').innerHTML =
        `<div class="empty-state"><div class="empty-icon">Г°ЕёвҖҳВӨ</div>
        <div class="empty-title">Nenhum funcionГғВЎrio cadastrado</div>
        <div class="empty-desc"><button class="btn btn-primary btn-sm" onclick="abrirModal()">+ Cadastrar</button></div></div>`;
      return;
    }

    let html = `<table><thead><tr>
      <th>Nome</th><th>Cargo</th><th>Contrato</th><th>SalГғВЎrio</th><th>AdmissГғВЈo</th><th>Telefone</th><th>Status</th><th>AГғВ§ГғВөes</th>
    </tr></thead><tbody>`;

    lista.forEach(f => {
      html += `<tr>
        <td><div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;background:linear-gradient(135deg,#4A148C,#CE93D8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0">
            ${Fmt.inicial(f.nome)}
          </div>
          <div>
            <strong>${f.nome}</strong>
            ${f.email ? `<br><small class="text-muted">${f.email}</small>` : ''}
          </div>
        </div></td>
        <td>${f.cargo || '-'}</td>
        <td><span class="badge badge-info">${contratos[f.contrato]||f.contrato||'-'}</span></td>
        <td><strong>${Fmt.moeda(f.salario)}</strong></td>
        <td>${Fmt.data(f.admissao ? f.admissao+'T00:00:00' : null)}</td>
        <td>${Fmt.telefone(f.telefone)}</td>
        <td>${badgeStatus(f.ativo !== false ? 'ativo' : 'inativo')}</td>
        <td><div class="td-actions">
          <button class="btn btn-sm btn-ghost btn-icon" onclick="editar(${f.id})">ГўЕ“ВҸГҜВёВҸ</button>
          <button class="btn btn-sm btn-ghost btn-icon" onclick="excluir(${f.id})">Г°ЕёвҖ”вҖҳГҜВёВҸ</button>
        </div></td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('tabela-wrap').innerHTML = html;
  }

  function abrirModal(f = null) {
    document.getElementById('func-id').value = f ? f.id : '';
    document.getElementById('func-nome').value = f ? f.nome : '';
    document.getElementById('func-cpf').value = f ? (f.cpf || '') : '';
    document.getElementById('func-cargo').value = f ? (f.cargo || '') : '';
    document.getElementById('func-salario').value = f ? (f.salario || '') : '';
    document.getElementById('func-telefone').value = f ? (f.telefone || '') : '';
    document.getElementById('func-email').value = f ? (f.email || '') : '';
    document.getElementById('func-admissao').value = f ? (f.admissao || '') : hoje();
    document.getElementById('func-contrato').value = f ? (f.contrato || 'clt') : 'clt';
    document.getElementById('func-endereco').value = f ? (f.endereco || '') : '';
    document.getElementById('func-obs').value = f ? (f.observacoes || '') : '';
    document.getElementById('func-ativo').checked = f ? (f.ativo !== false) : true;
    document.getElementById('modal-titulo').textContent = f ? 'Editar FuncionГғВЎrio' : 'Novo FuncionГғВЎrio';
    Modal.abrir('modal-func');
  }

  function editar(id) { abrirModal(_funcCache.find(f => f.id === id)); }

  function excluir(id) {
    const f = _funcCache.find(x => x.id === id);
    if (!f) return;
    confirmar(`Excluir funcionГғВЎrio <strong>${f.nome}</strong>?`, async () => {
      await DB.Funcionarios.deletar(id);
      mostrarToast('FuncionГғВЎrio excluГғВӯdo', 'danger');
      await carregar();
    });
  }

  async function salvar() {
    const id = document.getElementById('func-id').value;
    const nome = document.getElementById('func-nome').value.trim();
    const cargo = document.getElementById('func-cargo').value.trim();
    if (!nome) return mostrarToast('Informe o nome', 'warning');
    if (!cargo) return mostrarToast('Informe o cargo', 'warning');

    await DB.Funcionarios.salvar({
      id: id ? Number(id) : undefined,
      nome,
      cpf: document.getElementById('func-cpf').value.trim(),
      cargo,
      salario: parseFloat(document.getElementById('func-salario').value) || 0,
      telefone: document.getElementById('func-telefone').value.trim(),
      email: document.getElementById('func-email').value.trim(),
      admissao: document.getElementById('func-admissao').value,
      contrato: document.getElementById('func-contrato').value,
      endereco: document.getElementById('func-endereco').value.trim(),
      observacoes: document.getElementById('func-obs').value.trim(),
      ativo: document.getElementById('func-ativo').checked
    });

    mostrarToast(id ? 'FuncionГғВЎrio atualizado!' : 'FuncionГғВЎrio cadastrado!', 'success');
    Modal.fechar('modal-func');
    await carregar();
  }

  (async () => { await carregar(); })();
</script>
</body>
</html>
