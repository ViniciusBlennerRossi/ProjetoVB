<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos — Fiore Pijamas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .chart-bar-wrap { padding: 4px 0; }
    .chart-bar-item { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:12px; }
    .chart-bar-label { width:130px; text-align:right; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
    .chart-bar-track { flex:1; background:var(--border); border-radius:4px; height:20px; position:relative; overflow:visible; }
    .chart-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#C62828,#EF9A9A); display:flex; align-items:center; padding-left:8px; }
    .chart-bar-val { font-size:11px; font-weight:700; color:var(--white); white-space:nowrap; }
    .chart-bar-val.out { position:absolute; left:calc(100%+6px); top:50%; transform:translateY(-50%); color:var(--text); white-space:nowrap; }
  </style>
</head>
<body>
<div class="layout" id="app">
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">💸 Controle de Gastos</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="abrirModal()">+ Novo Gasto</button>
      </div>
    </div>
    <div class="page-content">

      <!-- Stats -->
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px" id="stats-area"></div>

      <!-- Filtros -->
      <div class="card" style="padding:14px 18px;margin-bottom:20px">
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <div class="search-input-wrap" style="flex:1;min-width:200px">
            <span class="search-icon">🔍</span>
            <input type="text" id="busca" class="form-control" placeholder="Buscar por descrição..." oninput="filtrar()" />
          </div>
          <select id="filtro-cat" class="form-control form-select" style="max-width:160px" onchange="filtrar()">
            <option value="">Todas categorias</option>
          </select>
          <input type="date" id="data-inicio" class="form-control" style="max-width:150px" onchange="filtrar()" />
          <input type="date" id="data-fim" class="form-control" style="max-width:150px" onchange="filtrar()" />
        </div>
      </div>

      <div class="grid grid-2" style="margin-bottom:20px">
        <!-- Gráfico por categoria -->
        <div class="card">
          <div class="card-header"><div class="card-title">📊 Gastos por Categoria</div></div>
          <div class="card-body" id="chart-cats"></div>
        </div>

        <!-- Resumo mensal -->
        <div class="card">
          <div class="card-header"><div class="card-title">📅 Últimos 6 Meses</div></div>
          <div class="card-body" id="chart-meses"></div>
        </div>
      </div>

      <!-- Tabela -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">💸 Lista de Gastos</div>
          <span id="count-label" class="badge badge-secondary"></span>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrapper" id="tabela-wrap"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Gasto -->
<div class="modal-overlay" id="modal-gasto">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-titulo">Novo Gasto</div>
      <button class="modal-close" onclick="Modal.fechar('modal-gasto')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="gasto-id" />
      <div class="form-group">
        <label class="form-label">Descrição *</label>
        <input type="text" id="gasto-desc" class="form-control" placeholder="Ex: Aluguel de dezembro, Conta de luz..." />
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select id="gasto-cat" class="form-control form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Valor (R$) *</label>
          <input type="number" id="gasto-valor" class="form-control" step="0.01" min="0" placeholder="0,00" />
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Data *</label>
          <input type="date" id="gasto-data" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">Forma de Pagamento</label>
          <select id="gasto-forma" class="form-control form-select"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Observações</label>
        <input type="text" id="gasto-obs" class="form-control" placeholder="NF, referência, etc." />
      </div>
      <div class="form-group">
        <label class="form-label">Recorrente?</label>
        <select id="gasto-recorrente" class="form-control form-select">
          <option value="">Não</option>
          <option value="mensal">Mensal</option>
          <option value="semanal">Semanal</option>
          <option value="anual">Anual</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.fechar('modal-gasto')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvar()">💾 Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/tenant.js"></script>
  <script src="js/db.js"></script>
<script src="js/icons.js"></script>
<<script src="js/app.js"></script>
<script>
  if (!Auth.exigirPermissao('gastos')) throw '';
  Tenant.inicializarTenant();
  document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('gastos'));

  const h = hoje();
  document.getElementById('data-inicio').value = h.slice(0,8)+'01';
  document.getElementById('data-fim').value = h;

  let _gastosCache = [];
  let _catGastosCache = [];
  let _catGastosMap = {};
  let _vendasCache = [];

  function _gastosDoMes(ano, mes) {
    const ini = `${ano}-${String(mes+1).padStart(2,'0')}-01`;
    const fim = new Date(ano, mes+1, 0).toISOString().split('T')[0];
    return _gastosCache.filter(g => g.data >= ini && g.data <= fim);
  }

  function _vendasDoMes(ano, mes) {
    const ini = `${ano}-${String(mes+1).padStart(2,'0')}-01`;
    const fim = new Date(ano, mes+1, 0).toISOString().split('T')[0];
    return _vendasCache.filter(v => {
      const d = v.data ? v.data.split('T')[0] : '';
      return d >= ini && d <= fim;
    });
  }

  function popularSelects() {
    const selCat = document.getElementById('filtro-cat');
    const selCatModal = document.getElementById('gasto-cat');
    selCat.innerHTML = '<option value="">Todas categorias</option>';
    selCatModal.innerHTML = '';
    _catGastosCache.forEach(c => {
      selCat.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
      selCatModal.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
    });
    const selForma = document.getElementById('gasto-forma');
    selForma.innerHTML = '';
    FORMAS_PGTO.forEach(f => selForma.innerHTML += `<option value="${f.value}">${f.label}</option>`);
  }

  async function carregar() {
    mostrarLoader();
    try {
      const [gastos, cats, vendas] = await Promise.all([
        DB.Gastos.todos(),
        DB.CategoriasGastos.todas(),
        DB.Vendas.todas()
      ]);
      _gastosCache = gastos;
      _catGastosCache = cats;
      _catGastosMap = Object.fromEntries(cats.map(c => [c.id, c]));
      _vendasCache = vendas;
      popularSelects();
      filtrar();
      renderGraficos();
    } catch(e) {
      mostrarToast('Erro ao carregar gastos', 'danger');
    } finally {
      ocultarLoader();
    }
  }

  function filtrar() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const catId = Number(document.getElementById('filtro-cat').value);
    const dinicio = document.getElementById('data-inicio').value;
    const dfim = document.getElementById('data-fim').value;

    const lista = _gastosCache.filter(g => {
      const gData = g.data || '';
      const mb = !busca || (g.descricao||'').toLowerCase().includes(busca);
      const mc = !catId || g.categoria_id === catId;
      const md = (!dinicio || gData >= dinicio) && (!dfim || gData <= dfim);
      return mb && mc && md;
    }).sort((a, b) => b.data.localeCompare(a.data));

    renderStats(lista);
    renderTabela(lista);
    document.getElementById('count-label').textContent = lista.length + ' gastos';
  }

  function renderStats(lista) {
    const total = lista.reduce((s, g) => s + (g.valor||0), 0);
    const agora = new Date();
    const gastosMes = _gastosDoMes(agora.getFullYear(), agora.getMonth());
    const totalMes = gastosMes.reduce((s, g) => s + (g.valor||0), 0);
    const vendasMes = _vendasDoMes(agora.getFullYear(), agora.getMonth()).filter(v => v.status !== 'cancelada');
    const faturamentoMes = vendasMes.reduce((s, v) => s + (v.total||0), 0);
    const lucroEstimado = faturamentoMes - totalMes;

    document.getElementById('stats-area').innerHTML = `
      <div class="stat-card"><div class="stat-icon red">💸</div>
        <div class="stat-info"><div class="stat-value">${Fmt.moeda(total)}</div><div class="stat-label">Total no período</div></div></div>
      <div class="stat-card"><div class="stat-icon orange">📅</div>
        <div class="stat-info"><div class="stat-value">${Fmt.moeda(totalMes)}</div><div class="stat-label">Gastos este mês</div></div></div>
      <div class="stat-card"><div class="stat-icon pink">💰</div>
        <div class="stat-info"><div class="stat-value">${Fmt.moeda(faturamentoMes)}</div><div class="stat-label">Vendas este mês</div></div></div>
      <div class="stat-card"><div class="stat-icon ${lucroEstimado>=0?'green':'red'}">📈</div>
        <div class="stat-info"><div class="stat-value" style="color:${lucroEstimado>=0?'var(--success)':'var(--danger)'}">${Fmt.moeda(lucroEstimado)}</div><div class="stat-label">Resultado estimado</div></div></div>`;
  }

  function renderTabela(lista) {
    if (!lista.length) {
      document.getElementById('tabela-wrap').innerHTML =
        `<div class="empty-state"><div class="empty-icon">💸</div><div class="empty-title">Nenhum gasto no período</div>
        <div class="empty-desc"><button class="btn btn-primary btn-sm" onclick="abrirModal()">+ Registrar gasto</button></div></div>`;
      return;
    }

    let html = `<table><thead><tr>
      <th>Data</th><th>Descrição</th><th>Categoria</th><th>Forma</th><th>Valor</th><th>Recorrente</th><th>Ações</th>
    </tr></thead><tbody>`;

    lista.forEach(g => {
      const cat = _catGastosMap[g.categoria_id];
      html += `<tr>
        <td>${Fmt.data(g.data+'T00:00:00')}</td>
        <td><strong>${g.descricao}</strong>${g.observacoes ? `<br><small class="text-muted">${g.observacoes}</small>` : ''}</td>
        <td>${cat ? cat.nome : '-'}</td>
        <td>${labelFormaPgto(g.forma_pagamento)}</td>
        <td><strong class="text-danger">${Fmt.moeda(g.valor)}</strong></td>
        <td>${g.recorrente ? `<span class="badge badge-info">${g.recorrente}</span>` : '-'}</td>
        <td><div class="td-actions">
          <button class="btn btn-sm btn-ghost btn-icon" onclick="editar(${g.id})">✏️</button>
          <button class="btn btn-sm btn-ghost btn-icon" onclick="excluir(${g.id})">🗑️</button>
        </div></td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('tabela-wrap').innerHTML = html;
  }

  function renderGraficos() {
    // Por categoria
    const porCat = {};
    _gastosCache.forEach(g => {
      const cat = _catGastosMap[g.categoria_id];
      const nome = cat ? cat.nome : 'Outros';
      porCat[nome] = (porCat[nome]||0) + (g.valor||0);
    });
    const catSorted = Object.entries(porCat).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const maxCat = catSorted[0]?.[1] || 1;
    let catHtml = '<div class="chart-bar-wrap">';
    catSorted.forEach(([nome, val]) => {
      const pct = (val/maxCat*100).toFixed(1);
      catHtml += `<div class="chart-bar-item">
        <div class="chart-bar-label">${nome}</div>
        <div class="chart-bar-track">
          <div class="chart-bar-fill" style="width:${pct}%">
            ${pct>20?`<span class="chart-bar-val">${Fmt.moeda(val)}</span>`:''}
          </div>
          ${pct<=20?`<span class="chart-bar-val out">${Fmt.moeda(val)}</span>`:''}
        </div>
      </div>`;
    });
    catHtml += '</div>';
    document.getElementById('chart-cats').innerHTML = catSorted.length ? catHtml :
      '<div class="empty-state" style="padding:30px"><div class="empty-icon">📊</div><div class="empty-title">Sem dados</div></div>';

    // Por mês (últimos 6)
    const agora = new Date();
    const meses = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(agora.getFullYear(), agora.getMonth() - i, 1);
      const label = d.toLocaleDateString('pt-BR', {month:'short', year:'2-digit'});
      const totalG = _gastosDoMes(d.getFullYear(), d.getMonth()).reduce((s,g)=>s+(g.valor||0),0);
      const fat = _vendasDoMes(d.getFullYear(), d.getMonth()).filter(v=>v.status!=='cancelada').reduce((s,v)=>s+(v.total||0),0);
      meses.push({ label, total: totalG, fat });
    }
    const maxMes = Math.max(...meses.map(m=>Math.max(m.total,m.fat)),1);
    let mesHtml = '<div class="chart-bar-wrap">';
    meses.forEach(m => {
      const pctG = (m.total/maxMes*100).toFixed(1);
      const pctV = (m.fat/maxMes*100).toFixed(1);
      mesHtml += `<div class="chart-bar-item">
        <div class="chart-bar-label">${m.label}</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:3px">
          <div style="display:flex;align-items:center;gap:6px;font-size:11px">
            <div style="flex:1;background:var(--border);border-radius:3px;height:14px;position:relative">
              <div style="width:${pctG}%;height:100%;border-radius:3px;background:linear-gradient(90deg,#C62828,#EF9A9A);display:flex;align-items:center">
                ${pctG>25?`<span style="font-size:10px;color:#fff;padding-left:6px;font-weight:700">${Fmt.moeda(m.total)}</span>`:''}
              </div>
              ${pctG<=25?`<span style="font-size:10px;position:absolute;left:calc(100%+4px);top:50%;transform:translateY(-50%);white-space:nowrap;color:var(--danger)">${Fmt.moeda(m.total)}</span>`:''}
            </div>
            <span style="width:50px;text-align:right;color:var(--danger)">Gasto</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:11px">
            <div style="flex:1;background:var(--border);border-radius:3px;height:14px;position:relative">
              <div style="width:${pctV}%;height:100%;border-radius:3px;background:linear-gradient(90deg,#1B5E20,#A5D6A7);display:flex;align-items:center">
                ${pctV>25?`<span style="font-size:10px;color:#fff;padding-left:6px;font-weight:700">${Fmt.moeda(m.fat)}</span>`:''}
              </div>
              ${pctV<=25?`<span style="font-size:10px;position:absolute;left:calc(100%+4px);top:50%;transform:translateY(-50%);white-space:nowrap;color:var(--success)">${Fmt.moeda(m.fat)}</span>`:''}
            </div>
            <span style="width:50px;text-align:right;color:var(--success)">Venda</span>
          </div>
        </div>
      </div>`;
    });
    mesHtml += '</div>';
    document.getElementById('chart-meses').innerHTML = mesHtml;
  }

  function abrirModal(g = null) {
    document.getElementById('gasto-id').value = g ? g.id : '';
    document.getElementById('gasto-desc').value = g ? (g.descricao||'') : '';
    document.getElementById('gasto-cat').value = g ? (g.categoria_id||'') : '';
    document.getElementById('gasto-valor').value = g ? (g.valor||'') : '';
    document.getElementById('gasto-data').value = g ? (g.data||hoje()) : hoje();
    document.getElementById('gasto-forma').value = g ? (g.forma_pagamento||'dinheiro') : 'dinheiro';
    document.getElementById('gasto-obs').value = g ? (g.observacoes||'') : '';
    document.getElementById('gasto-recorrente').value = g ? (g.recorrente||'') : '';
    document.getElementById('modal-titulo').textContent = g ? 'Editar Gasto' : 'Novo Gasto';
    Modal.abrir('modal-gasto');
  }

  function editar(id) { abrirModal(_gastosCache.find(g => g.id === id)); }

  function excluir(id) {
    const g = _gastosCache.find(x => x.id === id);
    if (!g) return;
    confirmar(`Excluir gasto <strong>${g.descricao}</strong>?`, async () => {
      await DB.Gastos.deletar(id);
      mostrarToast('Gasto excluído', 'danger');
      await carregar();
    });
  }

  async function salvar() {
    const id = document.getElementById('gasto-id').value;
    const descricao = document.getElementById('gasto-desc').value.trim();
    const valor = parseFloat(document.getElementById('gasto-valor').value) || 0;
    const data = document.getElementById('gasto-data').value;

    if (!descricao) return mostrarToast('Informe a descrição', 'warning');
    if (valor <= 0) return mostrarToast('Informe um valor válido', 'warning');
    if (!data) return mostrarToast('Informe a data', 'warning');

    await DB.Gastos.salvar({
      id: id ? Number(id) : undefined,
      descricao,
      categoria_id: Number(document.getElementById('gasto-cat').value) || null,
      valor, data,
      forma_pagamento: document.getElementById('gasto-forma').value,
      observacoes: document.getElementById('gasto-obs').value.trim(),
      recorrente: document.getElementById('gasto-recorrente').value || null
    });

    mostrarToast(id ? 'Gasto atualizado!' : 'Gasto registrado!', 'success');
    Modal.fechar('modal-gasto');
    await carregar();
  }

  (async () => { await carregar(); })();
</script>
</body>
</html>
